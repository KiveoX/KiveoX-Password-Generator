    <style>
      :root {
        --background: #120204;
        --card: rgba(20, 5, 8, 0.82);
        --text: #f8fafc;
        --secondary: #cbd5e1;
        --accent: #e30613;
        --border: rgba(227, 6, 19, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--text);

        width: min(92%, 780px);
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow:
          0 35px 90px rgba(0, 0, 0, 0.5),
          0 0 45px rgba(227, 6, 19, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        color: var(--secondary);
        line-height: 1.6;
      }

      a {
        color: #93c5fd;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .notice {
        margin-top: 1.5rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background: rgba(2, 6, 23, 0.58);
      }

      .back {
        margin-top: 2rem;
